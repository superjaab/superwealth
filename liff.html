<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>SuperWealth · ฟอร์มบันทึก</title>
<style>
  :root{ --c:#1565C0; --cDark:#0D47A1; --bg:#F5F7FB; --line:#E4E8EE;
         --sub:#5A6577; --mute:#98A1B0; --text:#1A1F2E; --green:#2E7D32; --danger:#C62828; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,"Sarabun","Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
  .wrap{ max-width:540px; margin:0 auto; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  header{ background:var(--cDark); color:#fff; padding:20px 18px 16px; }
  header h1{ margin:0; font-size:19px; font-weight:800; }
  header p{ margin:5px 0 0; font-size:12.5px; color:#cfe2ff; }
  form{ padding:16px; display:flex; flex-direction:column; gap:14px; flex:1; }
  .field label{ display:block; font-size:13px; font-weight:700; color:var(--sub); margin-bottom:6px; }
  .req{ color:var(--danger); }
  .field input, .field select{ width:100%; padding:13px 12px; font-size:16px; font-family:inherit;
    border:1.5px solid var(--line); border-radius:12px; background:#fff; color:var(--text); appearance:none; }
  .field select{ background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%235A6577' stroke-width='2.5'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat; background-position:right 12px center; padding-right:38px; }
  .field input:focus, .field select:focus{ outline:none; border-color:var(--c); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  /* v15.85 — 3-คอลัมน์ (รอบเที่ยว + วันเข้ารับ + วันส่ง) */
  .row3{ display:grid; gap:8px; }
  .row3 .field input{ padding-left:9px; padding-right:6px; font-size:15px; min-width:0; }
  /* v15.86 — dropdown แบบเดียวกับเว็บ (แตะแล้วเห็นรายการ พิมพ์เพื่อกรอง) */
  .ac-wrap{ position:relative; }
  .ac-panel{ display:none; position:absolute; left:0; right:0; top:calc(100% + 4px); z-index:30;
    background:#fff; border:1.5px solid var(--c); border-radius:12px; box-shadow:0 10px 28px rgba(0,0,0,.16);
    max-height:240px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .ac-opt{ padding:12px 14px; font-size:15px; color:var(--text); border-bottom:1px solid #f1f5f9; cursor:pointer; }
  .ac-opt:last-child{ border-bottom:none; }
  .ac-opt:active, .ac-opt.on{ background:#eef4ff; }
  .ac-empty{ padding:12px 14px; font-size:13px; color:var(--mute); }
  .btns{ position:sticky; bottom:0; background:linear-gradient(transparent,var(--bg) 28%);
    padding:14px 16px calc(18px + env(safe-area-inset-bottom)); display:flex; gap:10px; }
  button{ flex:1; padding:15px; font-size:16px; font-weight:800; font-family:inherit; border:none; border-radius:14px; cursor:pointer; }
  .cancel{ background:#E9ECF2; color:var(--sub); flex:0 0 32%; }
  .save{ background:var(--c); color:#fff; }
  .save:disabled{ opacity:.55; }
  .overlay{ position:fixed; inset:0; background:rgba(245,247,251,.96); display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; padding:30px; text-align:center; z-index:9; }
  .overlay.show{ display:flex; }
  .spinner{ width:40px; height:40px; border:4px solid var(--line); border-top-color:var(--c); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .ok-emoji{ font-size:56px; }
  .ok-title{ font-size:20px; font-weight:800; color:var(--green); }
  .ok-id{ font-size:13px; color:var(--mute); }
  .err{ color:var(--danger); font-weight:700; }
  .hint{ font-size:11.5px; color:var(--mute); margin-top:4px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="title">บันทึก</h1>
    <p id="subtitle">กรอกข้อมูลให้ครบแล้วกดบันทึก</p>
  </header>
  <form id="f" autocomplete="off"></form>
  <div class="btns">
    <button type="button" class="cancel" id="cancelBtn">ยกเลิก</button>
    <button type="submit" form="f" class="save" id="saveBtn">✅ บันทึก</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div id="loading"><div class="spinner"></div><p>กำลังบันทึก…</p></div>
  <div id="done" style="display:none">
    <div class="ok-emoji">✅</div>
    <div class="ok-title" id="okMsg">บันทึกสำเร็จ</div>
    <div class="ok-id" id="okId"></div>
    <div class="btns" style="position:static;background:none;padding-top:18px">
      <button class="save" id="closeBtn">เสร็จสิ้น</button>
    </div>
  </div>
  <div id="failbox" style="display:none">
    <div class="ok-emoji">⚠️</div>
    <div class="err" id="failMsg">บันทึกไม่สำเร็จ</div>
    <div class="btns" style="position:static;background:none;padding-top:18px">
      <button class="cancel" id="retryBtn" style="flex:1">↩️ ลองใหม่</button>
    </div>
  </div>
</div>

<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  // ใส่ LIFF ID เมื่อตั้งค่าใน LINE Developers Console แล้ว (auto-close กลับแชต)
  const LIFF_ID = "";
  const API = location.origin;
  const PROVINCES = ['กรุงเทพ','นครราชสีมา','ขอนแก่น','อุดรธานี','เชียงใหม่','สมุทรปราการ',
    'ชลบุรี','นนทบุรี','พระนครศรีอยุธยา','ระยอง','นครปฐม','ปทุมธานี','สระบุรี','สุราษฎร์ธานี'];

  // ── Form configs per record type ──────────────────────────────
  const TYPES = {
    truck: { title:'🚛 บันทึกรถ', color:'#1565C0', sub:'งานเดินรถ / เที่ยววิ่ง',
      fields:[
        {id:'tripRound', label:'รอบเที่ยว', type:'number', placeholder:'อัตโนมัติ', third:true},
        {id:'pickupDate', label:'วันที่เข้ารับ', type:'date', required:true, third:true},
        {id:'deliveryDate', label:'วันส่งสินค้า', type:'date', third:true},
        {id:'plateNumber', label:'ทะเบียนรถ', type:'plate', required:true},
        {id:'driverName', label:'คนขับ', type:'text', placeholder:'ชื่อคนขับ (เติมอัตโนมัติเมื่อเลือกทะเบียน)'},
        {id:'originCustomer', label:'ลูกค้าต้นทาง', type:'customer', placeholder:'ผู้ว่าจ้าง / ผู้ส่งสินค้า'},
        {id:'customerName', label:'ลูกค้าปลายทาง', type:'customer', placeholder:'ผู้รับ / ปลายทาง'},
        {id:'origin', label:'จังหวัดต้นทาง', type:'province', half:true},
        {id:'destination', label:'จังหวัดปลายทาง', type:'province', half:true},
        {id:'freightCost', label:'ค่าขนส่ง (บาท)', type:'number', half:true},
        {id:'paymentStatus', label:'สถานะ', type:'select', options:['ค้างจ่าย','จ่ายแล้ว'], half:true},
      ]},
    income: { title:'💰 บันทึกรายรับ', color:'#2E7D32', sub:'เงินเข้า',
      fields:[
        {id:'incomeDate', label:'วันที่รับเงิน', type:'date', required:true},
        {id:'incomeItem', label:'ประเภทรายรับ', type:'select', options:['ค่าขนส่ง','ค่ามัดจำ','อื่นๆ']},
        {id:'amount', label:'จำนวนเงิน (บาท)', type:'number', required:true, half:true},
        {id:'paymentMethod', label:'ช่องทาง', type:'select', options:['เงินสด','โอน','เช็ค'], half:true},
        {id:'customerName', label:'ลูกค้า (ถ้ามี)', type:'customer'},
      ]},
    expense: { title:'💸 บันทึกรายจ่าย', color:'#C62828', sub:'เงินออก',
      fields:[
        {id:'expenseDate', label:'วันที่จ่ายเงิน', type:'date', required:true},
        {id:'category', label:'ประเภทรายจ่าย', type:'select', required:true,
          options:['น้ำมัน','ซ่อมบำรุง','ค่าทางด่วน','เบี้ยเลี้ยง','ค่าปรับ','อื่นๆ']},
        {id:'amount', label:'จำนวนเงิน (บาท)', type:'number', required:true, half:true},
        {id:'paymentMethod', label:'ช่องทาง', type:'select', options:['เงินสด','โอน','เช็ค'], half:true},
        {id:'plateNumber', label:'ทะเบียนรถ (ถ้าเกี่ยวกับรถ)', type:'plate'},
      ]},
    maintenance: { title:'🔧 บันทึกซ่อมบำรุง', color:'#E65100', sub:'การซ่อม / ดูแลรถ',
      fields:[
        {id:'maintenanceDate', label:'วันที่ซ่อม', type:'date', required:true},
        {id:'plateNumber', label:'ทะเบียนรถ', type:'plate', required:true},
        {id:'maintenanceType', label:'ประเภทการซ่อม', type:'select',
          options:['เปลี่ยนยาง','น้ำมันเครื่อง','เบรค','ช่วงล่าง','แอร์','ไฟฟ้า','ตรวจสภาพ','ล้างรถ','อื่นๆ']},
        {id:'cost', label:'ค่าซ่อม (บาท)', type:'number', required:true},
      ]},
  };

  const params = new URLSearchParams(location.search);
  const type = TYPES[params.get('type')] ? params.get('type') : 'truck';
  const cfg = TYPES[type];

  // theme
  document.documentElement.style.setProperty('--c', cfg.color);
  document.querySelector('header').style.background = cfg.color;
  document.getElementById('title').textContent = cfg.title;
  document.getElementById('subtitle').textContent = cfg.sub + ' · มี dropdown ให้เลือก';
  document.title = 'SuperWealth · ' + cfg.title;
  document.getElementById('saveBtn').style.background = cfg.color;

  // ── v15.86 — autocomplete dropdown แบบเดียวกับเว็บ (แตะ→เห็นทั้งหมด, พิมพ์→กรอง, แตะเลือก) ──
  function _liffAC(input, getItems) {
    if (!input || input._ac) return; input._ac = true;
    const wrap = document.createElement('div'); wrap.className = 'ac-wrap';
    input.parentNode.insertBefore(wrap, input); wrap.appendChild(input);
    const panel = document.createElement('div'); panel.className = 'ac-panel'; wrap.appendChild(panel);
    const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const render = () => {
      const q = input.value.trim().toLowerCase();
      let items = (getItems() || []).filter(Boolean);
      if (q) items = items.filter(o => String(o).toLowerCase().includes(q));
      items = items.slice(0, 50);
      panel.innerHTML = items.length
        ? items.map(o => `<div class="ac-opt">${esc(o)}</div>`).join('')
        : '<div class="ac-empty">— ไม่มีในรายการ · พิมพ์เพื่อเพิ่มใหม่ได้ —</div>';
      panel.style.display = 'block';
    };
    input.addEventListener('focus', render);
    input.addEventListener('input', render);
    input.addEventListener('blur', () => setTimeout(() => { panel.style.display = 'none'; }, 160));
    const pick = e => {
      const opt = e.target.closest('.ac-opt'); if (!opt) return;
      e.preventDefault();
      input.value = opt.textContent;
      panel.style.display = 'none';
      input.dispatchEvent(new Event('change', { bubbles: true }));
    };
    panel.addEventListener('mousedown', pick);
    panel.addEventListener('touchstart', pick, { passive: false });
  }

  // ── Build the form ────────────────────────────────────────────
  const form = document.getElementById('f');
  let pendingHalf = null;
  function fieldHTML(fl){
    const reqStar = fl.required ? ' <span class="req">*</span>' : '';
    let input;
    if (fl.type === 'select') {
      input = `<select id="${fl.id}" ${fl.required?'required':''}>` +
        (fl.required ? `<option value="" disabled selected>— เลือก —</option>` : '') +
        fl.options.map(o=>`<option>${o}</option>`).join('') + `</select>`;
    } else if (fl.type === 'plate') {
      input = `<input id="${fl.id}" data-ac="plate" autocomplete="off" ${fl.required?'required':''} placeholder="เลือกหรือพิมพ์ทะเบียน">`;
    } else if (fl.type === 'province') {
      input = `<input id="${fl.id}" data-ac="province" autocomplete="off" placeholder="เลือกหรือพิมพ์จังหวัด">`;
    } else if (fl.type === 'customer') {
      input = `<input id="${fl.id}" data-ac="customer" autocomplete="off" placeholder="${fl.placeholder||'เลือกหรือพิมพ์ชื่อลูกค้า'}">`;
    } else if (fl.type === 'date') {
      input = `<input id="${fl.id}" type="date" ${fl.required?'required':''}>`;
    } else if (fl.type === 'number') {
      input = `<input id="${fl.id}" type="number" inputmode="numeric" min="0" placeholder="0" ${fl.required?'required':''}>`;
    } else {
      input = `<input id="${fl.id}" type="text" placeholder="${fl.placeholder||''}">`;
    }
    return `<div class="field">
      <label for="${fl.id}">${fl.label}${reqStar}</label>${input}
      ${fl.type==='plate'?'<div class="hint">เลือกจากรายการ หรือพิมพ์ทะเบียนใหม่ก็ได้</div>':''}
    </div>`;
  }
  // v15.85 — group consecutive half (2-col) / third (3-col) fields into rows
  let html = '', buf = [], bufKind = null;
  const flush = () => {
    if (!buf.length) return;
    if (bufKind === 'half' && buf.length === 2) html += `<div class="row2">${buf.join('')}</div>`;
    else if (bufKind === 'third' && buf.length >= 2) {
      const cols = buf.length === 3 ? '0.7fr 1fr 1fr' : `repeat(${buf.length},1fr)`;
      html += `<div class="row3" style="grid-template-columns:${cols}">${buf.join('')}</div>`;
    } else html += buf.join('');
    buf = []; bufKind = null;
  };
  for (const fl of cfg.fields) {
    const kind = fl.third ? 'third' : (fl.half ? 'half' : null);
    if (!kind) { flush(); html += fieldHTML(fl); continue; }
    if (bufKind && bufKind !== kind) flush();
    bufKind = kind;
    buf.push(fieldHTML(fl));
    if (kind === 'half'  && buf.length === 2) flush();
    if (kind === 'third' && buf.length === 3) flush();
  }
  flush();
  // v15.84 — แนบรูป/ใบเสร็จ (ทุกฟอร์ม) — ถ่าย/เลือกจากเครื่อง
  html += `<div class="field">
    <label>📷 แนบรูป / ใบเสร็จ (ถ้ามี)</label>
    <input type="file" id="imgInput" accept="image/*" multiple style="display:none">
    <button type="button" id="imgBtn" style="width:100%;padding:13px;border:1.5px dashed var(--c);border-radius:12px;background:#fff;color:var(--c);font-weight:800;font-size:15px;font-family:inherit;cursor:pointer">📷 ถ่ายรูป / เลือกรูป (อัลบั้ม)</button>
    <div id="imgThumbs" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px"></div>
    <div class="hint">แนบได้หลายรูป · ระบบย่อขนาดให้อัตโนมัติ</div>
  </div>`;
  form.innerHTML = html;

  // v15.86 — dropdown แบบเดียวกับเว็บ (แตะ→เห็นรายการทั้งหมด · พิมพ์→กรอง · แตะเลือก)
  let custList = [];   // รายชื่อลูกค้า — ลิงก์จากเว็บหลัก
  document.querySelectorAll('input[data-ac="province"]').forEach(el => _liffAC(el, () => PROVINCES));
  document.querySelectorAll('input[data-ac="plate"]').forEach(el => _liffAC(el, () => Object.keys(vehMap).sort((a,b)=>a.localeCompare(b,'th'))));
  document.querySelectorAll('input[data-ac="customer"]').forEach(el => _liffAC(el, () => custList));
  // โหลดรายชื่อลูกค้าจากเมนูลูกค้า + ต้นทาง/ปลายทางในเที่ยวรถ (เหมือน dropdown เว็บ)
  (async () => {
    try {
      const set = new Set();
      const rc = await (await fetch(`${API}/api/get-data?type=customer`)).json();
      ((rc.data && rc.data.customer) || []).forEach(c => { const n=(c.customerName||'').trim(); if (n) set.add(n); });
      const rt = await (await fetch(`${API}/api/get-data?type=truck`)).json();
      ((rt.data && rt.data.truck) || []).forEach(t => { [t.originCustomer, t.customerName].forEach(x => { const n=(x||'').trim(); if (n) set.add(n); }); });
      custList = [...set].sort((a,b)=>a.localeCompare(b,'th'));
    } catch (e) { console.warn('load customers failed:', e); }
  })();

  // ── v15.84 — image attach logic (compress → base64 → /api/upload-images) ──
  const _imgFiles = [];
  const imgInput = document.getElementById('imgInput');
  const imgBtn = document.getElementById('imgBtn');
  const imgThumbs = document.getElementById('imgThumbs');
  imgBtn.addEventListener('click', () => imgInput.click());
  imgInput.addEventListener('change', () => {
    for (const f of imgInput.files) if (f.type.startsWith('image/')) _imgFiles.push(f);
    imgInput.value = '';
    _renderThumbs();
  });
  window._rmImg = (i) => { _imgFiles.splice(i, 1); _renderThumbs(); };
  function _renderThumbs() {
    imgThumbs.innerHTML = _imgFiles.map((f, i) =>
      `<div style="position:relative;width:64px;height:64px">
        <img src="${URL.createObjectURL(f)}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--line)">
        <button type="button" onclick="_rmImg(${i})" style="position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;border:none;background:#C62828;color:#fff;font-size:12px;line-height:1;cursor:pointer">✕</button>
      </div>`).join('');
  }
  function _fileToDataURL(file) {
    return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
  }
  async function _compress(file) {
    const dataUrl = await _fileToDataURL(file);
    return new Promise(res => {
      const img = new Image();
      img.onload = () => {
        const max = 1600; let w = img.width, h = img.height;
        if (w > max || h > max) { const s = max / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
        const c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        res(c.toDataURL('image/jpeg', 0.8));
      };
      img.onerror = () => res(dataUrl);
      img.src = dataUrl;
    });
  }
  async function uploadImages() {
    if (!_imgFiles.length) return [];
    const images = [];
    for (const f of _imgFiles) images.push({ base64: await _compress(f), mimeType: 'image/jpeg', filename: (f.name || 'image').replace(/\.[^.]+$/, '') + '.jpg' });
    const r = await fetch(`${API}/api/upload-images`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ images }) });
    const j = await r.json();
    return (j.urls || []).map(u => u.url).filter(Boolean);
  }
  window._liffUploadImages = uploadImages;   // ใช้ตอน submit

  // default date = today
  cfg.fields.filter(f=>f.type==='date').forEach(f=>{
    document.getElementById(f.id).value = new Date().toISOString().slice(0,10);
  });

  // ── Fetch real vehicles → plate dropdown + driver auto-fill ────
  let vehMap = {};
  (async () => {
    try {
      const r = await fetch(`${API}/api/get-data?type=vehicle`);
      const j = await r.json();
      const list = (j.data && j.data.vehicle) || [];
      list.forEach(v => { if (v.plateNumber) vehMap[v.plateNumber] = v; });
    } catch(e){ console.warn('load vehicles failed:', e); }
  })();
  // driver auto-fill when a known plate is chosen (truck form)
  const plateEl = document.getElementById('plateNumber');
  const driverEl = document.getElementById('driverName');
  if (plateEl && driverEl) {
    plateEl.addEventListener('change', () => {
      const v = vehMap[plateEl.value.trim()];
      if (v && v.assignedDriver && !driverEl.value) driverEl.value = v.assignedDriver;
    });
  }

  // ── ⚡ Quick-entry: prefill from admin defaults ───────────────
  let quickDef = {}, _nextRound = null;
  if (type !== 'maintenance') {
    const bar = document.createElement('div');
    bar.style.cssText = 'padding:0 16px;margin-top:6px';
    bar.innerHTML = `<button type="button" id="quickBtn" style="width:100%;padding:13px;font-size:15px;font-weight:800;font-family:inherit;border:none;border-radius:12px;background:#0EA5E9;color:#fff;cursor:pointer">⚡ ลงด่วน — เติมค่าที่ตั้งไว้</button>
      <div style="font-size:11.5px;color:#98A1B0;text-align:center;margin-top:5px">เติมค่าที่ตั้งไว้ให้ทุกช่อง · เหลือแค่เช็กวันที่ แล้วกดบันทึก</div>`;
    form.parentNode.insertBefore(bar, form);
    (async () => {
      try {
        const r = await fetch(`${API}/api/get-data?type=quickDefaults`);
        const j = await r.json();
        const rows = (j.data && j.data.quickDefaults) || [];
        if (rows.length && rows[rows.length-1].payload) quickDef = JSON.parse(rows[rows.length-1].payload);
      } catch(e){ console.warn('load quick defaults failed:', e); }
    })();
    if (type === 'truck') (async () => {
      try {
        const r = await fetch(`${API}/api/get-data?type=truck`);
        const j = await r.json();
        const jobs = (j.data && j.data.truck) || [];
        _nextRound = jobs.reduce((m,t)=>Math.max(m, parseInt(t.tripRound)||0), 0) + 1;
        const trEl = document.getElementById('tripRound');   // v15.84 — เติมเลขรอบถัดไปให้ (แก้ได้)
        if (trEl && !trEl.value) trEl.value = _nextRound;
      } catch(e){ _nextRound = null; }
    })();
    document.getElementById('quickBtn').addEventListener('click', () => {
      const d = (quickDef && quickDef[type]) || {};
      cfg.fields.forEach(f => {
        if (f.type === 'date') return;                 // keep today's date
        if (d[f.id] != null && d[f.id] !== '') { const el = document.getElementById(f.id); if (el) el.value = d[f.id]; }
      });
      if (type === 'truck') {
        const pe = document.getElementById('plateNumber'), de = document.getElementById('driverName');
        const v = pe && vehMap[pe.value.trim()];
        if (v && v.assignedDriver && de && !de.value) de.value = v.assignedDriver;
      }
      const btn = document.getElementById('quickBtn');
      btn.textContent = '✅ เติมค่าแล้ว — เช็กวันที่ แล้วกดบันทึก'; btn.style.background = '#16A34A';
    });
  }

  // ── LIFF init (no-op in demo/plain-web mode) ──────────────────
  let liffReady = false;
  (async () => {
    if (LIFF_ID && window.liff) {
      try { await liff.init({ liffId: LIFF_ID }); liffReady = true; } catch(e){ console.warn('liff init:', e); }
    }
  })();

  // ── Build save payload from the form ──────────────────────────
  function collect(){
    const val = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
    const d = {}; cfg.fields.forEach(f => d[f.id] = val(f.id));
    d.userAgent = liffReady ? 'LINE LIFF' : 'LINE Form';
    if (type === 'truck') { d.jobDate = d.pickupDate; d.jobStatus = 'กำลังดำเนินการ'; d.tripCount = 1;
      if (!d.tripRound && _nextRound) d.tripRound = _nextRound;   // v15.84 — ค่าที่พิมพ์เองชนะ, ไม่งั้นใช้อัตโนมัติ
      const v = vehMap[d.plateNumber]; if (v && v.assignedDriverPhone) d.driverPhone = v.assignedDriverPhone; }
    if (type === 'expense') d.expenseDetail = d.category;
    if (type === 'maintenance') d.description = d.maintenanceType;
    return d;
  }

  // ── Submit ────────────────────────────────────────────────────
  const overlay = document.getElementById('overlay');
  const show = el => { ['loading','done','failbox'].forEach(x=>document.getElementById(x).style.display='none');
    document.getElementById(el).style.display='block'; overlay.classList.add('show'); };

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!form.reportValidity()) return;
    document.getElementById('saveBtn').disabled = true;
    show('loading');
    try {
      const data = collect();
      // v15.84 — อัปโหลดรูปก่อน แล้วแนบ URL เข้าไปกับข้อมูล
      try {
        const urls = (typeof _liffUploadImages === 'function') ? await _liffUploadImages() : [];
        if (urls.length) data.imageUrls = urls;
      } catch (e) { console.warn('upload images failed:', e); }
      const r = await fetch(`${API}/api/save`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ type, data })
      });
      const j = await r.json();
      if (!j.success) throw new Error(j.error || 'save failed');
      document.getElementById('okMsg').textContent = j.message || 'บันทึกสำเร็จ';
      document.getElementById('okId').textContent = 'รหัส: ' + (j.rowId||'');
      show('done');
      // LIFF: ส่งข้อความยืนยันกลับแชต แล้วปิดหน้าต่าง
      if (liffReady && liff.isInClient && liff.isInClient()) {
        try { await liff.sendMessages([{ type:'text', text:`✅ ${j.message} (${j.rowId})` }]); } catch(_){}
      }
    } catch(err) {
      document.getElementById('failMsg').textContent = '⚠️ ' + (err.message || 'บันทึกไม่สำเร็จ');
      show('failbox');
    } finally {
      document.getElementById('saveBtn').disabled = false;
    }
  });

  function leave(){
    if (liffReady && liff.isInClient && liff.isInClient()) liff.closeWindow();
    else history.length > 1 ? history.back() : window.close();
  }
  document.getElementById('cancelBtn').addEventListener('click', leave);
  document.getElementById('closeBtn').addEventListener('click', leave);
  document.getElementById('retryBtn').addEventListener('click', () => overlay.classList.remove('show'));
</script>
</body>
</html>
